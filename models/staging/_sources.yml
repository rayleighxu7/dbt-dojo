version: 2

sources:
  - name: raw
    description: Raw data landed by Fivetran. Each table contains a packed JSON `data` column.
    freshness:
      warn_after: { count: 24, period: hour }
      error_after: { count: 48, period: hour }
    loaded_at_field: _fivetran_synced
    tables:
      - name: orders
        description: Raw order records with all fields packed in the `data` JSON column.
        columns:
          - name: data
            description: JSON blob containing order fields (id, customer_id, amount, status, created_at, etc.)
          - name: _fivetran_synced
            description: Timestamp of when Fivetran last synced this row.
          - name: _fivetran_deleted
            description: Fivetran soft-delete flag.

      - name: customers
        description: Raw customer records with all fields packed in the `data` JSON column.
        columns:
          - name: data
            description: JSON blob containing customer fields (id, name, email, created_at, etc.)
          - name: _fivetran_synced
            description: Timestamp of when Fivetran last synced this row.
          - name: _fivetran_deleted
            description: Fivetran soft-delete flag.
